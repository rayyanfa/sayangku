<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayangku Yang Nyebelin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Sacramento&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #ff6ec7, #ff9a9e, #f0f8ff, #d4a5a5, #f8b88b);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-family: 'Sacramento', cursive;
            color: #ff6347;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(255, 99, 71, 0.6);
        }
        .message {
            font-size: 22px;
            margin-top: 20px;
            color: #333;
            font-weight: 600;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
        }
        .heart {
            color: red;
            font-size: 35px;
        }
        img {
            margin-top: 20px;
            max-width: 80%;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
        }
        .emoticon {
            font-size: 60px;
            margin-top: 20px;
        }
        
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <h1>Kepada Cintaku Selamanya, Siti Azizah Azzahra</h1>
    <p class="message">Maafin aku kalau punya salah yaa sayang <span class="heart">❤️</span> jangan marah-marahan yaa sayang, ini aku cuma iseng hehehhe. Love you sayangggg <span class="heart">❤️❤️❤️</span></p>
    
    <!-- Menampilkan gambar -->
    <img src="Screenshot%202026-01-02%20at%2013.03.46.png" alt="Foto Pacar" />
    
    <!-- Menambahkan emotikon love -->
    <div class="emoticon">😍❤️💖💘</div>
</body>
</html>
